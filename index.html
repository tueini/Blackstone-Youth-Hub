<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Youth Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .card-hover { transition: all 0.3s ease; border: 1px solid #334155; position: relative; overflow: hidden; touch-action: manipulation; }
        .card-hover:hover { transform: translateY(-5px); border-color: #3b82f6; background: #1e293b; }
        .card-combined { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .admin-input { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; width: 100%; font-size: 14px; outline: none; }
        .admin-input:focus { border-color: #3b82f6; }
        .btn-primary { background: #2563eb; color: white; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <header class="py-16 px-6 text-center bg-gradient-to-b from-slate-900 to-slate-950">
        <h1 class="text-4xl md:text-6xl font-black mb-3 tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
            2026 Youth Hub
        </h1>
        <p class="text-slate-500 text-sm font-bold uppercase tracking-[0.3em]">Blackstone Ward</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-12">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
            <a href="/Combined/" class="card-hover card-combined p-8 md:p-12 rounded-2xl block text-center md:col-span-3">
                <span class="absolute top-4 right-4 bg-blue-600 text-[9px] font-black px-2 py-1 rounded uppercase tracking-widest">Master</span>
                <h3 class="text-2xl md:text-3xl font-black text-white mb-2">Combined Activities</h3>
                <p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest">Dances • Conferences • Ward Nights</p>
            </a>

            <a href="/Priests/" class="card-hover p-6 md:p-8 rounded-2xl bg-slate-800/40 block text-center">
                <h3 class="text-lg font-bold text-white uppercase tracking-wider">Priests</h3>
            </a>
            <a href="/Teachers/" class="card-hover p-6 md:p-8 rounded-2xl bg-slate-800/40 block text-center">
                <h3 class="text-lg font-bold text-white uppercase tracking-wider">Teachers</h3>
            </a>
            <a href="/Deacons/" class="card-hover p-6 md:p-8 rounded-2xl bg-slate-800/40 block text-center">
                <h3 class="text-lg font-bold text-white uppercase tracking-wider">Deacons</h3>
            </a>
            <a href="/YW/" class="card-hover p-6 md:p-8 rounded-2xl bg-slate-800/40 block text-center">
                <h3 class="text-lg font-bold text-white uppercase tracking-wider">Young Women</h3>
            </a>
            <a href="/Primary/" class="card-hover p-6 md:p-8 rounded-2xl bg-slate-800/40 block text-center md:col-span-2">
                <h3 class="text-lg font-bold text-white uppercase tracking-wider">Primary</h3>
            </a>
        </div>
    </main>

    <section class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8 mb-20">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl flex flex-col shadow-xl">
            <h2 class="text-xs font-black mb-6 uppercase tracking-[0.2em] text-blue-500">Ward Announcements</h2>
            <div id="announcement-list" class="space-y-4 text-slate-300 text-sm mb-6 flex-1">
                <p class="italic opacity-50">Loading announcements...</p>
            </div>
            
            <div id="admin-controls" class="hidden space-y-4 border-t border-slate-800 pt-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">New Announcement</label>
                    <textarea id="new-ann-text" class="admin-input h-20" placeholder="Type here..."></textarea>
                    <button id="saveAnnBtn" class="btn-primary w-full py-3 rounded-lg text-xs">Post Announcement</button>
                </div>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl flex flex-col shadow-xl">
            <h2 class="text-xs font-black mb-6 uppercase tracking-[0.2em] text-emerald-500">General Info</h2>
            <div id="info-content" class="flex-1 space-y-8">
                <div>
                    <p class="text-[10px] font-bold text-slate-500 uppercase mb-3 tracking-widest">2026 Youth Theme</p>
                    <p id="display-theme" class="text-lg text-white font-medium italic leading-relaxed">Loading...</p>
                </div>
                <div class="pt-6 border-t border-slate-800">
                    <p class="text-[10px] font-bold text-slate-500 uppercase mb-2 tracking-widest">Next Combined Event</p>
                    <p id="next-combined-text" class="text-emerald-400 font-black text-xl leading-tight">Syncing...</p>
                </div>
            </div>

            <div id="info-admin-controls" class="hidden mt-8 space-y-4 border-t border-slate-800 pt-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Update Youth Theme</label>
                    <input type="text" id="edit-theme" class="admin-input" placeholder="Enter theme text...">
                    <button id="saveThemeBtn" class="bg-emerald-600 hover:bg-emerald-500 text-white font-black py-3 rounded-lg w-full text-xs uppercase tracking-widest">Update Theme</button>
                </div>
            </div>
        </div>
    </section>

    <footer class="text-center pb-20">
        <button id="hubUnlockBtn" class="text-[10px] font-bold text-slate-700 hover:text-blue-400 uppercase tracking-widest transition">
            Manage Hub Content
        </button>
        <button id="hubLockBtn" class="hidden text-[10px] font-bold text-red-900 hover:text-red-500 uppercase tracking-widest transition">
            Lock Hub Tools
        </button>
        <p class="text-[9px] text-slate-800 mt-4">v4.8 Power Hub</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, setDoc, doc, deleteDoc, getDoc, query, orderBy, limit, where, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDrWB07WNqObtjiZb_NntJQZ0dhHyLRBas",
            authDomain: "blackstoneward-b861c.firebaseapp.com",
            projectId: "blackstoneward-b861c",
            storageBucket: "blackstoneward-b861c.firebasestorage.app",
            messagingSenderId: "609425206588",
            appId: "1:609425206588:web:99ae3cb602c82e212dc239",
            measurementId: "G-0T68YN4Y2P"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const MASKED_PASS = "Y2FwdGFpbm1vcm9uaQ==";

        async function initHub() {
            try {
                // 1. Announcements
                const annSnap = await getDocs(query(collection(db, "home_announcements"), orderBy("timestamp", "desc")));
                const annContainer = document.getElementById('announcement-list');
                let annHTML = '';
                annSnap.forEach(s => {
                    annHTML += `
                        <div class="group flex justify-between items-start border-l-2 border-blue-600 pl-4 py-1">
                            <p class="text-white font-medium">${s.data().text}</p>
                            <button onclick="window.delAnn('${s.id}')" class="hidden group-hover:block text-[8px] text-red-500 font-black ml-2 pt-1 uppercase">Delete</button>
                        </div>`;
                });
                annContainer.innerHTML = annHTML || '<p class="italic opacity-30 text-xs">No active announcements.</p>';

                // 2. Theme
                const themeDoc = await getDoc(doc(db, "home_content", "general_info"));
                if (themeDoc.exists()) {
                    document.getElementById('display-theme').innerText = themeDoc.data().theme || "No theme set.";
                    document.getElementById('edit-theme').value = themeDoc.data().theme || "";
                }

                // 3. Next Combined (AUTO)
                const todayStr = new Date().toISOString().split('T')[0];
                const qCombined = query(collection(db, "Combined_events"), where("date", ">=", todayStr), orderBy("date", "asc"), limit(1));
                const combinedSnap = await getDocs(qCombined);
                const nextBox = document.getElementById('next-combined-text');
                if (!combinedSnap.empty) {
                    const ev = combinedSnap.docs[0].data();
                    const d = new Date(ev.date + "T00:00:00");
                    nextBox.innerText = `${ev.name} — ${d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
                } else {
                    nextBox.innerText = "Check back soon!";
                }
            } catch (e) { console.error("Hub Load Error:", e); }
        }

        // ADMIN LOGIC
        const unlockBtn = document.getElementById('hubUnlockBtn');
        const lockBtn = document.getElementById('hubLockBtn');
        const adminToolsAnn = document.getElementById('admin-controls');
        const adminToolsInfo = document.getElementById('info-admin-controls');

        unlockBtn.onclick = () => {
            const p = prompt("Password:");
            if (p && btoa(p.toLowerCase().trim()) === MASKED_PASS) {
                unlockBtn.classList.add('hidden');
                lockBtn.classList.remove('hidden');
                adminToolsAnn.classList.remove('hidden');
                adminToolsInfo.classList.remove('hidden');
                // Force show delete buttons
                document.querySelectorAll('.group button').forEach(b => b.classList.remove('hidden'));
            }
        };

        lockBtn.onclick = () => location.reload();

        document.getElementById('saveAnnBtn').onclick = async () => {
            const text = document.getElementById('new-ann-text').value;
            if (text) {
                await addDoc(collection(db, "home_announcements"), { text, timestamp: Timestamp.now() });
                initHub(); 
                document.getElementById('new-ann-text').value = '';
            }
        };

        document.getElementById('saveThemeBtn').onclick = async () => {
            const theme = document.getElementById('edit-theme').value;
            await setDoc(doc(db, "home_content", "general_info"), { theme }, { merge: true });
            initHub();
            alert("Theme Updated!");
        };

        window.delAnn = async (id) => {
            if (confirm("Remove this announcement?")) {
                await deleteDoc(doc(db, "home_announcements", id));
                initHub();
            }
        };

        initHub();
    </script>
</body>
</html>
