<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Bid Sheets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            @page {
                size: letter;
                margin: 0.5in;
            }
            .print-item {
                page-break-after: always;
                page-break-inside: avoid;
                display: block;
                position: relative;
                height: 100%;
                overflow: hidden;
            }
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>
<body class="bg-white text-black font-sans">
    <div class="no-print p-6 bg-gray-100 border-b border-gray-300 shadow-sm mb-4">
        <h1 class="text-2xl font-bold mb-4">Print Generator Control Panel</h1>
        <div class="flex items-center gap-4">
            <select id="printMode" class="border border-gray-300 rounded p-2 text-lg">
                <option value="all">Print All Items</option>
                <option value="range">Print Specific Range</option>
            </select>
            
            <div id="rangeInputs" class="hidden flex items-center gap-2">
                <label for="startItem" class="font-semibold">Start Item #:</label>
                <input type="number" id="startItem" class="border border-gray-300 rounded p-2 w-24" min="1">
                
                <label for="endItem" class="font-semibold">End Item #:</label>
                <input type="number" id="endItem" class="border border-gray-300 rounded p-2 w-24" min="1">
            </div>
            
            <button id="generateBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition duration-200">Generate & Print</button>
        </div>
    </div>
    <div id="print-container">
        <p id="loading-msg" class="p-8 text-xl">Loading auction items for print...</p>
    </div>
    <script type="module" src="/js/print.js"></script>
</body>
</html>
