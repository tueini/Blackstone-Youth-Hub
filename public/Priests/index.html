    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; -webkit-tap-highlight-color: transparent; }
        input[type="date"]::-webkit-calendar-picker-indicator { margin-right: 10px; opacity: 1; display: block !important; cursor: pointer; }
        input[type="date"] { color-scheme: dark; position: relative; }
        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .month-card { background: #1e293b; border-radius: 12px; padding: 1.25rem; border: 1px solid #334155; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; font-size: 0.75rem; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 6px; background: #0f172a; transition: transform 0.1s ease; position: relative; touch-action: manipulation; min-width: 0; min-height: 0; }
        @media (hover: hover) { .day.has-event:hover { transform: scale(1.1); z-index: 10; filter: brightness(1.25); border-color: white; } }
        .day.has-event:active { transform: scale(0.95); transition: transform 0.05s ease; }
        .day.has-event { cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .day.today { border: 2px solid #fbbf24; box-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
        .dot-social { background-color: #ec4899; }
        .dot-physical { background-color: #10b981; }
        .dot-spiritual { background-color: #8b5cf6; }
        .dot-intellectual { background-color: #f59e0b; }
        .dot-combined { background-color: #3b82f6; }
        .event-social { background-color: rgba(236, 72, 153, 0.4); }
        .event-physical { background-color: rgba(16, 185, 129, 0.4); }
        .event-spiritual { background-color: rgba(139, 92, 246, 0.4); }
        .event-intellectual { background-color: rgba(245, 158, 11, 0.4); }
        .event-combined { background-color: rgba(59, 130, 246, 0.4); }
        .dot-physical, .event-physical { background-color: #10b981; }
        .dot-spiritual, .event-spiritual { background-color: #8b5cf6; }
        .dot-intellectual, .event-intellectual { background-color: #f59e0b; }
        .dot-combined, .event-combined { background-color: #3b82f6; }
        #info-pane { scrollbar-width: thin; scrollbar-color: #334155 #0f172a; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .custom-file-upload { border: 1px solid #3b82f6; display: inline-block; padding: 12px; cursor: pointer; background: #1e293b; color: #60a5fa; border-radius: 8px; width: 100%; text-align: center; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.2s; }
        
        /* CUSTOM MODAL ANIMATION */
        .modal-bg { background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
        
        /* v4.9 UPGRADES */
        .month-header { position: sticky; top: -1px; background-color: #1e293b; z-index: 20; padding: 1.25rem 1.25rem 0.75rem 1.25rem; margin: -1.25rem -1.25rem 0.75rem -1.25rem; border-radius: 12px 12px 0 0; border-bottom: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        #admin-table thead th { position: sticky; top: 0; z-index: 20; background-color: #0f172a; box-shadow: 0 1px 0 rgba(255,255,255,0.1); }
        @media print {
            body > *:not(#print-area) { display: none !important; }
            body { background: white !important; color: black !important; }
            #print-area { display: block !important; }
            .print-item { break-inside: avoid; margin-bottom: 8px; font-family: sans-serif; font-size: 14px; }
            .print-cat-social { color: #ec4899; }
            .print-cat-physical { color: #10b981; }
            .print-cat-spiritual { color: #8b5cf6; }
            .print-cat-intellectual { color: #f59e0b; }
            .print-cat-combined { color: #3b82f6; }
        }
    </style>

<!-- Birthday Protocol -->
<style>
    @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(5deg); }

    @keyframes confetti-fall {
        0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }

    }
    .balloon { animation: float 3s ease-in-out infinite; }
    .confetti { position: absolute; width: 10px; height: 10px; animation: confetti-fall 4s linear infinite; }
</style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, setDoc, doc, deleteDoc, getDoc, writeBatch, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { GOOGLE_API_KEY, GOOGLE_CLIENT_ID, GOOGLE_APP_ID } from "/js/config.js";
        import { initPrintHandler } from "/js/print-handler.js";

        const pathSegments = window.location.pathname.split('/').filter(p => p && p.toLowerCase() !== 'index.html');
        const ORGANIZATION_NAME = pathSegments.length > 0 ? pathSegments[pathSegments.length - 1] : "Combined";
        const isCombinedPage = ORGANIZATION_NAME.toLowerCase() === "combined";
        const displayOrg = ORGANIZATION_NAME.charAt(0).toUpperCase() + ORGANIZATION_NAME.slice(1);
        
        const titleEl = document.getElementById('org-title');
        if (titleEl) {
            titleEl.innerText = isCombinedPage ? "Combined" : `${displayOrg}`;
        }

        const firebaseConfig = {
            apiKey: "AIzaSyDrWB07WNqObtjiZb_NntJQZ0dhHyLRBas",
            authDomain: "blackstoneward-b861c.firebaseapp.com",
            projectId: "blackstoneward-b861c",
            storageBucket: "blackstoneward-b861c.firebasestorage.app",
            messagingSenderId: "609425206588",
            appId: "1:609425206588:web:99ae3cb602c82e212dc239",
            measurementId: "G-0T68YN4Y2P"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window._firebaseDb = db;
        
        let events = [], unscheduled = [], lessons = [], orgTeachers = [], bdays = [];
        const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
        const today = new Date();

        async function initApp() {
            try {
                let currentOrg = ORGANIZATION_NAME;
                if (currentOrg === 'YW') currentOrg = 'Young Women';
                
                let q = ORGANIZATION_NAME === 'Combined' 
                    ? query(collection(db, "home_teachers"))
                    : query(collection(db, "home_teachers"), where("org", "in", [currentOrg, "General"]));
                    
                onSnapshot(q, (snapshot) => {
                    orgTeachers.length = 0;
                    snapshot.forEach(d => {
                        orgTeachers.push(d.data().name);
                    });
                    orgTeachers.sort();
                    try { if (typeof window.renderLessonManager === 'function') window.renderLessonManager(); } catch(e) {}
                });
            } catch (e) { console.error("Teacher fetch err:", e); }

            try {
                const allData = [];
                
                const bSnap = await getDocs(collection(db, "birthdays"));
                const bAllData = [];
                bSnap.forEach(d => bAllData.push({...d.data(), id: d.id}));
                bdays = bAllData;
        
                const orgSnap = await getDocs(collection(db, `${ORGANIZATION_NAME}_events`));
                orgSnap.forEach(d => allData.push({...d.data(), id: d.id, sourceOrg: ORGANIZATION_NAME}));
                if (!isCombinedPage) {
                    const combinedSnap = await getDocs(collection(db, "Combined_events"));
                    combinedSnap.forEach(d => allData.push({...d.data(), id: d.id, cat: 'combined', sourceOrg: 'Combined'}));
                }
                events = allData.filter(d => d.type === 'scheduled');
                unscheduled = allData.filter(d => d.type === 'unscheduled');
                
                
            try {
                if (ORGANIZATION_NAME !== 'Combined') {
                    const bdaySnap = await getDocs(collection(db, "birthdays"));
                    const bdayNames = [];
                    
                    bdaySnap.forEach(d => {
                        const binfo = d.data();
                        if (binfo.org === ORGANIZATION_NAME && binfo.date) {
                            let match = false;
                            let mMonth = "", mDay = "";
                            const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                            const mMap = { "01": "Jan", "02": "Feb", "03": "Mar", "04": "Apr", "05": "May", "06": "Jun", "07": "Jul", "08": "Aug", "09": "Sep", "10": "Oct", "11": "Nov", "12": "Dec", "1": "Jan", "2": "Feb", "3": "Mar", "4": "Apr", "5": "May", "6": "Jun", "7": "Jul", "8": "Aug", "9": "Sep" };
                            if (binfo.date.includes('-')) {
                                const p = binfo.date.split('-');
                                if (p.length === 3) { mMonth = mMap[p[1]]||"Jan"; mDay = parseInt(p[2]).toString(); }
                                else if (p.length === 2) { mMonth = mMap[p[0]]||"Jan"; mDay = parseInt(p[1]).toString(); }
                            } else if (binfo.date.includes('/')) {
                                const p = binfo.date.split('/');
                                mMonth = mMap[p[0]]||"Jan"; mDay = parseInt(p[1]).toString();
                            } else {
                                const p = binfo.date.split(' ');
                                mMonth = p[0]; mDay = parseInt(p[1]||1).toString();
                            }
                            const today = new Date();
                            if (mMonth === monthNames[today.getMonth()] && mDay === today.getDate().toString()) match = true;
                            
                            if (match) {
                                bdayNames.push(formatPrivacyName(binfo.name));
                            }
                        }
                    });
                    
                    if (bdayNames.length > 0 && !sessionStorage.getItem('birthdayShown_' + ORGANIZATION_NAME)) {
                        const m = document.getElementById('bdayModal');
                        if (m) {
                            document.getElementById('bdayNames').innerText = bdayNames.join(' & ');
                            m.classList.remove('hidden');
                            
                            // Generate Confetti
                            const cCont = document.getElementById('confetti-container');
                            const colors = ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6'];
                            for (let k = 0; k < 50; k++) {
                                const c = document.createElement('div');
                                c.className = 'confetti';
                                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                                c.style.left = Math.random() * 100 + '%';
                                c.style.animationDelay = Math.random() * 3 + 's';
                                c.style.animationDuration = Math.random() * 2 + 3 + 's';
                                cCont.appendChild(c);
                            }
                        }
                    }
                }
            } catch(e) { console.error("Bday fetch error:", e); }

                const lessonSnap = await getDocs(collection(db, `${ORGANIZATION_NAME}_lessons`));
                lessonSnap.forEach(d => lessons.push({...d.data(), id: d.id, sourceOrg: ORGANIZATION_NAME}));
                if (!isCombinedPage) {
                    const combinedL = await getDocs(collection(db, "Combined_lessons"));
                    combinedL.forEach(d => lessons.push({...d.data(), id: d.id, sourceOrg: 'Combined'}));
                }
                
                refreshUI();
            } catch (e) { console.error("Initial load failed:", e); }
        }

        function refreshUI() { renderCalendar(); renderDefaultPane(); renderUnscheduled(); if(document.getElementById('import-controls') && !document.getElementById('import-controls').classList.contains('hidden')) { renderDataManager(); renderLessonManager(); } }

        function renderCalendar() {
            const active = document.getElementById('active-months'), past = document.getElementById('past-months');
            active.innerHTML = ''; past.innerHTML = '';
            for (let m = 0; m < 12; m++) {
                const card = document.createElement('div');
                card.className = `month-card ${m === today.getMonth() ? 'border-blue-500/50 ring-1 ring-blue-500/20' : ''}`;
                card.innerHTML = `<h3 class="month-header font-bold text-slate-300 text-sm">${months[m]} 2026</h3>`;
                const grid = document.createElement('div');
                grid.className = 'days-grid';
                ['S','M','T','W','T','F','S'].forEach(d => { grid.innerHTML += `<div class="opacity-30 font-bold text-[10px]">${d}</div>`; });
                const firstDay = new Date(2026, m, 1).getDay(), daysInMonth = new Date(2026, m + 1, 0).getDate();
                for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `2026-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const evData = events.filter(e => e.date === dateStr);
                    const dL = lessons.filter(l => l.date === dateStr);
                    const dayEl = document.createElement('div');
                    
                    if (evData.length > 0 || dL.length > 0) {
                        dayEl.className = `day flex-col justify-end items-stretch p-1 ${today.getDate() === d && today.getMonth() === m ? 'today' : ''} border border-slate-700/30 overflow-visible cursor-pointer relative has-event`;
                        let html = `<span class="absolute top-[2px] right-[4px] z-10 text-[10px] font-black text-slate-400">${d}</span>`;
                        if (dL.length > 0) html += `<span class="absolute top-[2px] left-[2px] z-20 text-[12px] bg-violet-500/40 w-5 h-5 rounded flex items-center justify-center shadow-sm cursor-pointer transition-transform hover:scale-110 active:scale-95" title="Lesson: ${dL[0].topic || 'Scheduled'}">📖</span>`;
                        
                        html += `<div class="flex flex-col gap-[2px] w-full h-full justify-end mt-4">`;
                        
                        const displayCount = evData.length >= 4 ? 3 : evData.length;
                        for(let k=0; k<displayCount; k++) {
                            const e = evData[k];
                            html += `<div class="event-pill event-${e.cat} rounded-sm w-full h-[8px] sm:h-[12px] opacity-80 backdrop-blur-sm"></div>`;
                        }
                        
                        if (evData.length >= 4) {
                            html += `<div class="text-[8px] text-blue-400 font-black text-center w-full bg-blue-900/20 rounded-sm leading-tight inline-block">+${evData.length - 3}</div>`;
                        }
                        if (evData.some(e => e.isService)) html += `<span class="absolute top-[2px] right-[18px] z-20 text-[10px] text-yellow-400 drop-shadow-[0_1px_2px_rgba(0,0,0,0.8)]" title="Service Project">★</span>`;
                        html += `</div>`;
                        dayEl.innerHTML = html;
                        
                        // Bind unified Day Detail Popover 
                        dayEl.addEventListener('click', (e) => {
                            e.stopPropagation();
                            openDayDetailPopover(dateStr, evData, dL);
                        });
                    } else {
                        dayEl.className = `day ${today.getDate() === d && today.getMonth() === m ? 'today' : ''}`;
                        dayEl.innerHTML = `<span>${d}</span>`;
                    }
                    grid.appendChild(dayEl);
                }
                card.appendChild(grid);
                (m < today.getMonth()) ? past.appendChild(card) : active.appendChild(card);
            }
            if (document.getElementById('pastMonthsBtn')) {
                const togglerText = document.querySelector('#pastMonthsBtn span');
                document.getElementById('pastMonthsBtn').onclick = () => {
                    const isHidden = past.classList.toggle('hidden');
                    if (togglerText) togglerText.innerText = isHidden ? "See Previous Months" : "Hide Previous Months";
                };
            }
        }

        function showEvent(ev) {
            document.getElementById('pane-title').innerHTML = ev.name + (ev.isService ? '<span class="text-yellow-400 ml-2 drop-shadow" title="Service Project">★</span>' : '');
            const d = new Date(ev.date + "T00:00:00");
            document.getElementById('pane-date').innerText = `${months[d.getMonth()]} ${d.getDate()} • ${d.toLocaleDateString('en-US', { weekday: 'short' })}`;
            document.getElementById('pane-details').innerHTML = `<div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl"><div class="flex items-center gap-2 mb-4"><span class="w-3 h-3 rounded-full dot-${ev.cat}"></span><span class="text-[10px] font-black uppercase tracking-widest text-slate-400">${ev.cat}</span></div><p class="text-slate-300 leading-relaxed text-sm">${ev.details || 'No details.'}</p><button id="backBtn" class="mt-8 text-xs text-blue-400 font-bold hover:underline">← Back</button></div>`;
            document.getElementById('backBtn').onclick = renderDefaultPane;
        }

        function renderDefaultPane() {
            document.getElementById('pane-title').innerText = "Upcoming";
            document.getElementById('pane-date').innerText = "Next Activities";
            const upcoming = events.filter(e => new Date(e.date + "T23:59:59") >= today).sort((a,b) => new Date(a.date) - new Date(b.date)).slice(0,3);
            document.getElementById('pane-details').innerHTML = upcoming.map(e => {
                const d = new Date(e.date + "T00:00:00");
                return `<div id="up-${e.id}" class="group cursor-pointer bg-slate-800/40 hover:bg-slate-800 p-4 rounded-lg border border-slate-700/50 mb-2 transition"><div class="flex items-center justify-between mb-1"><p class="text-[10px] font-bold text-slate-500 uppercase">${months[d.getMonth()]} ${d.getDate()}</p><span class="w-2 h-2 rounded-full dot-${e.cat}"></span></div><p class="font-bold text-white group-hover:text-blue-400 transition text-sm">${e.name}${e.isService ? '<span class="text-yellow-400 ml-2 drop-shadow" title="Service Project">★</span>' : ''}</p></div>`;
            }).join('');
            upcoming.forEach(e => {
                const el = document.getElementById(`up-${e.id}`);
                if(el) el.onclick = () => showEvent(e);
            });
            if (typeof isListView !== 'undefined' && isListView && window.innerWidth < 1024) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function renderUnscheduled() {
            document.getElementById('idea-count').innerText = unscheduled.length;
            document.getElementById('unscheduled-ideas').innerHTML = unscheduled.map(i => `<div class="text-[11px] p-3 bg-slate-800/30 rounded border-l-2 border-slate-700 mb-2 flex items-center gap-3"><span class="w-2 h-2 shrink-0 rounded-full dot-${i.cat}"></span><div class="flex flex-col"><span class="font-bold text-slate-300 leading-tight">${i.name}</span>${i.isService ? '<span class="text-yellow-400 ml-1 text-[10px] drop-shadow-sm inline-block" title="Service Project">★</span>' : ''}${i.details ? `<span class="text-slate-500 italic text-[9px] mt-1">${i.details}</span>` : ''}</div></div>`).join('');
        }

        // --- v4.9 UPGRADES: LIST VIEW & PRINT ---
        let isListView = false;
        
        function formatListDate(dateStr) {
            const d = new Date(dateStr + "T00:00:00");
            return `${months[d.getMonth()]} ${d.getDate()}`;
        }

        function openDayDetailPopover(dateStr, dayEvents, dayLessons = []) {
            const modal = document.getElementById('dayDetailModal');
            if(!modal) return;
            const list = document.getElementById('dayDetailList');
            list.innerHTML = '';
            
            const dateObj = new Date(dateStr + "T12:00:00");
            const dayName = dateObj.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase();
            document.getElementById('dayDetailDate').innerText = `${formatListDate(dateStr)} • ${dayName}`;
            
            dayLessons.forEach(l => {
                const el = document.createElement('div');
                el.className = `p-3 rounded-lg border border-violet-500/40 bg-slate-800 mb-2 text-left shadow-lg cursor-pointer transition-transform active:scale-95 group`;
                el.innerHTML = `<div class="flex items-center mb-1"><span class="flex items-center justify-center w-6 h-6 rounded bg-violet-500/40 text-sm mr-2 leading-none shadow-sm transition-transform group-hover:scale-110">📖</span><span class="font-bold text-sm text-violet-400 truncate">Sunday Lesson</span></div><p class="text-xs text-white font-bold leading-tight pl-8">${l.topic || 'No Topic Set'}</p><p class="text-[10px] text-slate-400 pl-8 mt-1 uppercase tracking-widest">Teacher: ${l.teacher || 'TBD'}</p>${l.notes ? `<p class="text-[10px] text-slate-500 pl-8 mt-2 italic leading-tight">Note: ${l.notes}</p>` : ''}`;
                el.onclick = () => { modal.classList.add('hidden'); if(window.innerWidth < 1024) document.getElementById('info-pane').scrollIntoView({ behavior: 'smooth' }); };
                list.appendChild(el);
            });

            dayEvents.forEach(ev => {
                const colors = { 'social': 'pink', 'physical': 'emerald', 'spiritual': 'violet', 'intellectual': 'amber', 'combined': 'blue' };
                const c = colors[ev.cat] || 'slate';
                const el = document.createElement('div');
                el.className = `p-3 rounded-lg border border-${c}-500/30 bg-slate-800/80 mb-2 cursor-pointer transition active:scale-95 text-left`;
                el.innerHTML = `<div class="flex items-center mb-1"><span class="w-2 h-2 rounded-full bg-${c}-500 mr-2 shrink-0"></span><span class="font-bold text-sm text-white">${ev.name}</span>${ev.isService ? '<span class="text-yellow-400 ml-2 text-[10px] drop-shadow-sm" title="Service Project">★</span>' : ''}</div>${ev.details ? `<p class="text-[10px] text-slate-400 pl-4 leading-tight">${ev.details}</p>` : ''}`;
                el.onclick = () => { 
                    modal.classList.add('hidden'); 
                    showEvent(ev); 
                    if (window.innerWidth < 1024) document.getElementById('info-pane').scrollIntoView({ behavior: 'smooth' }); 
                };
                list.appendChild(el);
            });
            modal.classList.remove('hidden');
        }

        // Close Popover Bindings 
        document.getElementById('dayDetailModal').addEventListener('click', (e) => {
            if(e.target.id === 'dayDetailModal') { e.target.classList.add('hidden'); }
        });
        document.getElementById('closeDayDetailBtn').addEventListener('click', () => {
            document.getElementById('dayDetailModal').classList.add('hidden');
        });

        const listToggleBtn = document.getElementById('viewToggleBtn');
        listToggleBtn.addEventListener('click', () => {
            isListView = !isListView;
            listToggleBtn.innerText = isListView ? "Switch to Grid View" : "Switch to List View";
            document.getElementById('active-months').classList.toggle('hidden', isListView);
            document.getElementById('grid-controls-wrapper').classList.toggle('hidden', isListView);
            document.getElementById('printBtnList').classList.toggle('hidden', !isListView);
            const lv = document.getElementById('list-view');
            lv.classList.toggle('hidden', !isListView);
            if (isListView) {
                const upcomingEvents = [...events, ...lessons].filter(e => new Date(e.date + "T23:59:59") >= today).sort((a,b) => new Date(a.date) - new Date(b.date));
                lv.innerHTML = '';
                if (upcomingEvents.length === 0) {
                    lv.innerHTML = '<p class="text-slate-500 text-sm italic">No upcoming events.</p>';
                    return;
                }
                upcomingEvents.forEach(e => {
                    const d = new Date(e.date + "T00:00:00");
                    const dW = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"][d.getDay()];
                    
                    const el = document.createElement('div');
                    el.className = "flex items-center gap-3 p-4 bg-slate-800/40 border border-slate-700/50 rounded-xl hover:bg-slate-800 transition cursor-pointer";
                    
                    if (e.teacher !== undefined) {
                        el.innerHTML = `<span class="flex items-center gap-2 shrink-0"><span class="flex items-center justify-center w-6 h-6 rounded bg-violet-500/40 text-[10px] leading-none shadow-sm transition-transform hover:scale-110">📖</span><span class="text-xs font-bold text-slate-500 uppercase">${months[d.getMonth()]} ${d.getDate()} &bull; ${dW}</span></span><div class="truncate"><span class="text-sm font-bold text-violet-400 italic truncate block leading-tight">&bull; ${e.topic || 'Sunday Lesson'}</span><span class="text-[10px] text-slate-500 block pl-4">${e.teacher ? 'Teacher: '+e.teacher : ''}</span></div>`;
                    } else {
                        el.innerHTML = `<span class="flex items-center gap-2 shrink-0"><span class="w-2 h-2 rounded-full dot-${e.cat}"></span><span class="text-xs font-bold text-slate-500 uppercase">${months[d.getMonth()]} ${d.getDate()} &bull; ${dW}</span></span><span class="text-sm font-bold text-white truncate">${e.isService ? '⭐' : '&bull;'} ${e.name}</span>`;
                    }
                    
                    el.addEventListener('click', (ev) => {
                        ev.preventDefault();
                        if (e.teacher !== undefined) return; // Ignore click for lessons strictly
                        showEvent(e);
                        if (window.innerWidth < 1024) document.getElementById('info-pane').scrollIntoView({ behavior: 'smooth' });
                    });
                    lv.appendChild(el);
                });
            }
        });
        initPrintHandler(() => ({ events, lessons, unscheduled, displayOrg, months }));

        initApp();
    </script>
    

    <!-- Password Modal -->
    

    <!-- Global Feedback Modal -->
    <div id="feedbackModal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[150] flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-700/50 rounded-2xl w-full max-w-md shadow-2xl relative overflow-hidden text-left">
            <div class="px-6 py-4 border-b border-slate-800 flex items-center justify-between bg-slate-800/50">
                <h2 class="font-black text-lg text-white uppercase tracking-widest">Feedback</h2>
                <button id="closeFeedbackBtn" class="text-slate-500 hover:text-white transition font-black text-xl active:scale-95">✕</button>
            </div>
            <div class="p-6">
                <div id="feedbackSuccess" class="hidden mb-4 p-4 bg-emerald-500/20 border border-emerald-500/50 rounded-lg text-emerald-400 text-xs font-black text-center uppercase tracking-widest">
                    Success! Your feedback has been sent.
                </div>
                <form id="feedbackForm" class="flex flex-col gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Your Name</label>
                        <input type="text" id="feedbackName" required class="w-full bg-slate-950 text-white rounded-lg px-4 py-3 border border-slate-800 focus:border-blue-500 outline-none text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Category</label>
                        <select id="feedbackCategory" required class="w-full bg-slate-950 text-white rounded-lg px-4 py-3 border border-slate-800 focus:border-blue-500 outline-none text-sm">
                            <option value="Suggestion">💡 Suggestion</option>
                            <option value="Help">🙋 Help / Question</option>
                            <option value="Bug">🐛 Report a Bug</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Message</label>
                        <textarea id="feedbackMessage" rows="4" required class="w-full bg-slate-950 text-white rounded-lg px-4 py-3 border border-slate-800 focus:border-blue-500 outline-none text-sm resize-none"></textarea>
                    </div>
                    <button type="submit" id="feedbackSubmitBtn" class="w-full mt-2 bg-blue-600 hover:bg-blue-500 text-white font-black text-xs py-4 rounded-xl shadow-lg transition active:scale-95 uppercase tracking-widest">
                        Send Message
                    </button>
                    <button type="button" id="feedbackCloseBtn" class="w-full mt-2 bg-slate-800 hover:bg-slate-700 text-slate-400 font-bold text-[10px] py-3 rounded-xl transition active:scale-95 uppercase tracking-widest">Close</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const db = window._firebaseDb; // Need exact reference
        
        const fModal = document.getElementById('feedbackModal');
        const fClose = document.getElementById('closeFeedbackBtn');
        const fClose2 = document.getElementById('feedbackCloseBtn');
        const fBtnSide = document.getElementById('feedbackBtnSidebar');

        if(fBtnSide) {
            fBtnSide.addEventListener('click', () => {
                fModal.classList.remove('hidden');
                document.getElementById('feedbackSuccess').classList.add('hidden');
                document.getElementById('feedbackForm').reset();
            });
        }
        
        const closeM = () => fModal.classList.add('hidden');
        if(fClose) fClose.addEventListener('click', closeM);
        if(fClose2) fClose2.addEventListener('click', closeM);
        
        document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('feedbackSubmitBtn');
            btn.disabled = true;
            btn.innerHTML = 'Sending...';
            try {
                const dbInstance = getFirestore();
                await addDoc(collection(dbInstance, "site_feedback"), {
                    Name: document.getElementById('feedbackName').value.trim(),
                    Category: document.getElementById('feedbackCategory').value,
                    Message: document.getElementById('feedbackMessage').value.trim(),
                    timestamp: new Date().toISOString()
                });
                document.getElementById('feedbackForm').reset();
                document.getElementById('feedbackSuccess').classList.remove('hidden');
            } catch(err) {
                alert('Failed to send: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Send Message';
            }
        });
    </script>
    <script type="module" src="/js/birthday-protocol.js"></script>
</body>
