<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Youth Activities</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; -webkit-tap-highlight-color: transparent; }
        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .month-card { background: #1e293b; border-radius: 12px; padding: 1.25rem; border: 1px solid #334155; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; font-size: 0.75rem; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 6px; background: #0f172a; transition: transform 0.1s ease; position: relative; touch-action: manipulation; }
        @media (hover: hover) { .day.has-event:hover { transform: scale(1.1); z-index: 10; filter: brightness(1.25); border-color: white; } }
        .day.has-event { cursor: pointer; font-weight: 800; border: 1px solid rgba(255,255,255,0.05); }
        .day.today { border: 2px solid #fbbf24; box-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
        .dot-social, .event-social { background-color: #ec4899; }
        .dot-physical, .event-physical { background-color: #10b981; }
        .dot-spiritual, .event-spiritual { background-color: #8b5cf6; }
        .dot-intellectual, .event-intellectual { background-color: #f59e0b; }
        .dot-combined, .event-combined { background-color: #3b82f6; }
        #info-pane { scrollbar-width: thin; scrollbar-color: #334155 #0f172a; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .custom-file-upload { border: 1px solid #3b82f6; display: inline-block; padding: 12px; cursor: pointer; background: #1e293b; color: #60a5fa; border-radius: 8px; width: 100%; text-align: center; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.2s; }
        
        /* CUSTOM MODAL ANIMATION */
        .modal-bg { background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="flex flex-col lg:flex-row min-h-screen">
    <div id="customModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 modal-bg">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-sm rounded-2xl p-8 shadow-2xl text-center">
            <h3 class="text-xl font-black text-white mb-2">Sync Options</h3>
            <p id="modalMsg" class="text-slate-400 text-sm mb-8 leading-relaxed">Wipe existing calendar before sync? (Recommended for full updates)</p>
            <div class="flex flex-col gap-3">
                <button id="modalYes" class="bg-blue-600 hover:bg-blue-500 text-white font-black py-3 rounded-xl uppercase tracking-widest text-xs">Yes, Wipe & Sync</button>
                <button id="modalNo" class="bg-slate-800 hover:bg-slate-700 text-slate-300 font-black py-3 rounded-xl uppercase tracking-widest text-xs">No, Just Add New Items</button>
                <button id="modalCancel" class="text-slate-600 hover:text-white font-bold text-[10px] mt-2 uppercase tracking-widest">Cancel Entire Import</button>
            </div>
        </div>
    </div>

    <main class="flex-1 p-6 lg:p-10 lg:h-screen lg:overflow-y-auto">
        <header class="mb-10 text-center lg:text-left">
            <a href="/" class="text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-2 block hover:underline">← Ward Hub</a>
            <h1 id="org-title" class="text-3xl md:text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">2026 Activities</h1>
            <p class="text-slate-400 font-medium mb-4 text-[10px] uppercase tracking-widest text-center lg:text-left">Blackstone Ward</p>
            <div class="flex flex-wrap gap-2 text-[8px] font-bold uppercase tracking-widest justify-center lg:justify-start">
                <span class="flex items-center"><span class="w-2 h-2 bg-pink-500 rounded-full mr-1"></span> Social</span>
                <span class="flex items-center"><span class="w-2 h-2 bg-emerald-500 rounded-full mr-1"></span> Physical</span>
                <span class="flex items-center"><span class="w-2 h-2 bg-violet-500 rounded-full mr-1"></span> Spiritual</span>
                <span class="flex items-center"><span class="w-2 h-2 bg-amber-500 rounded-full mr-1"></span> Intellectual</span>
                <span class="flex items-center"><span class="w-2 h-2 bg-blue-500 rounded-full mr-1"></span> Combined</span>
            </div>
        </header>
        <details id="past-months-toggle" class="mb-12 group">
            <summary class="inline-flex items-center bg-slate-800 hover:bg-slate-700 px-6 py-3 rounded-full transition border border-slate-700 cursor-pointer list-none">
                <span id="toggle-text" class="text-slate-400 font-bold text-xs px-4">See Previous Months</span>
            </summary>
            <div id="past-months" class="calendar-grid mt-8 opacity-60"></div>
        </details>
        <div id="active-months" class="calendar-grid mb-12"></div>
    </main>

    <aside id="info-pane" class="w-full lg:w-96 bg-slate-900 border-t lg:border-t-0 lg:border-l border-slate-800 p-8 flex flex-col lg:h-screen lg:sticky lg:top-0">
        <div class="flex-1 overflow-y-auto pr-2">
            <h2 id="pane-title" class="text-2xl font-black mb-2 text-white uppercase tracking-tighter">Upcoming</h2>
            <p id="pane-date" class="text-blue-400 font-bold mb-6 uppercase tracking-wider text-[10px]">Next Activities</p>
            <div id="pane-details" class="space-y-4"></div>
            <hr class="my-8 border-slate-800">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-sm font-black text-slate-500 uppercase tracking-widest">Ideas</h3>
                <span id="idea-count" class="text-[10px] bg-slate-800 px-2 py-1 rounded text-slate-400 font-bold">0</span>
            </div>
            <div id="unscheduled-ideas" class="space-y-2"></div>
        </div>
        <div class="mt-6 pt-6 border-t border-slate-800 space-y-3">
            <div id="import-gate">
                <button id="unlockBtn" class="w-full bg-slate-800 hover:bg-blue-600 text-white text-xs font-bold py-3 px-4 rounded-lg transition-all uppercase tracking-widest">Manage Data</button>
            </div>
            <div id="import-controls" class="hidden space-y-3">
                <p class="text-[10px] text-emerald-400 font-bold uppercase text-center tracking-widest">Admin Mode Active</p>
                <label for="csvFileInput" class="custom-file-upload">Upload & Sync CSV</label>
                <input type="file" id="csvFileInput" accept=".csv" style="display:none;">
                <button id="wipeBtn" class="w-full bg-red-900/10 hover:bg-red-600 text-red-500 hover:text-white text-[10px] font-black py-2 rounded-lg transition-all uppercase tracking-widest border border-red-900/30">Manual Clear All</button>
                <button id="lockBtn" class="w-full text-[9px] text-slate-600 hover:text-white font-bold uppercase">Lock Tools</button>
            </div>
            <p class="text-[9px] text-slate-600 mt-2 text-center italic">v4.8 Custom UI Build</p>
        </div>
    </aside>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, setDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const pathSegments = window.location.pathname.split('/').filter(p => p && p.toLowerCase() !== 'index.html');
        const ORGANIZATION_NAME = pathSegments.length > 0 ? pathSegments[pathSegments.length - 1] : "Combined";
        const isCombinedPage = ORGANIZATION_NAME.toLowerCase() === "combined";
        const displayOrg = ORGANIZATION_NAME.charAt(0).toUpperCase() + ORGANIZATION_NAME.slice(1);
        document.getElementById('org-title').innerText = isCombinedPage ? "2026 Combined Schedule" : `2026 ${displayOrg} Activities`;

        const firebaseConfig = {
            apiKey: "AIzaSyDrWB07WNqObtjiZb_NntJQZ0dhHyLRBas",
            authDomain: "blackstoneward-b861c.firebaseapp.com",
            projectId: "blackstoneward-b861c",
            storageBucket: "blackstoneward-b861c.firebasestorage.app",
            messagingSenderId: "609425206588",
            appId: "1:609425206588:web:99ae3cb602c82e212dc239",
            measurementId: "G-0T68YN4Y2P"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const MASKED_PASS = "Y2FwdGFpbm1vcm9uaQ==";
        let events = [], unscheduled = [];
        const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
        const today = new Date();

        async function initApp() {
            try {
                const allData = [];
                const orgSnap = await getDocs(collection(db, `${ORGANIZATION_NAME}_events`));
                orgSnap.forEach(d => allData.push({...d.data(), id: d.id}));
                if (!isCombinedPage) {
                    const combinedSnap = await getDocs(collection(db, "Combined_events"));
                    combinedSnap.forEach(d => allData.push({...d.data(), id: d.id, cat: 'combined'}));
                }
                events = allData.filter(d => d.type === 'scheduled');
                unscheduled = allData.filter(d => d.type === 'unscheduled');
                refreshUI();
            } catch (e) { console.error("Initial load failed:", e); }
        }

        function refreshUI() { renderCalendar(); renderDefaultPane(); renderUnscheduled(); }

        function renderCalendar() {
            const active = document.getElementById('active-months'), past = document.getElementById('past-months');
            active.innerHTML = ''; past.innerHTML = '';
            for (let m = 0; m < 12; m++) {
                const card = document.createElement('div');
                card.className = `month-card ${m === today.getMonth() ? 'border-blue-500/50 ring-1 ring-blue-500/20' : ''}`;
                card.innerHTML = `<h3 class="font-bold text-slate-300 mb-3 text-sm">${months[m]} 2026</h3>`;
                const grid = document.createElement('div');
                grid.className = 'days-grid';
                ['S','M','T','W','T','F','S'].forEach(d => { grid.innerHTML += `<div class="opacity-30 font-bold text-[10px]">${d}</div>`; });
                const firstDay = new Date(2026, m, 1).getDay(), daysInMonth = new Date(2026, m + 1, 0).getDate();
                for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `2026-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const ev = events.find(e => e.date === dateStr);
                    const dayEl = document.createElement('div');
                    dayEl.className = `day ${ev ? 'has-event event-'+ev.cat : ''} ${today.getDate() === d && today.getMonth() === m ? 'today' : ''}`;
                    dayEl.innerHTML = `<span>${d}</span>`;
                    if (ev) {
                        dayEl.addEventListener('click', (e) => {
                            e.preventDefault(); showEvent(ev);
                            if (window.innerWidth < 1024) document.getElementById('info-pane').scrollIntoView({ behavior: 'smooth' });
                        });
                    }
                    grid.appendChild(dayEl);
                }
                card.appendChild(grid);
                (m < today.getMonth()) ? past.appendChild(card) : active.appendChild(card);
            }
        }

        function showEvent(ev) {
            document.getElementById('pane-title').innerText = ev.name;
            const d = new Date(ev.date + "T00:00:00");
            document.getElementById('pane-date').innerText = `${months[d.getMonth()]} ${d.getDate()} • ${d.toLocaleDateString('en-US', { weekday: 'short' })}`;
            document.getElementById('pane-details').innerHTML = `<div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl"><div class="flex items-center gap-2 mb-4"><span class="w-3 h-3 rounded-full dot-${ev.cat}"></span><span class="text-[10px] font-black uppercase tracking-widest text-slate-400">${ev.cat}</span></div><p class="text-slate-300 leading-relaxed text-sm">${ev.details || 'No details.'}</p><button id="backBtn" class="mt-8 text-xs text-blue-400 font-bold hover:underline">← Back</button></div>`;
            document.getElementById('backBtn').onclick = renderDefaultPane;
        }

        function renderDefaultPane() {
            document.getElementById('pane-title').innerText = "Upcoming";
            document.getElementById('pane-date').innerText = "Next Activities";
            const upcoming = events.filter(e => new Date(e.date + "T23:59:59") >= today).sort((a,b) => new Date(a.date) - new Date(b.date)).slice(0,3);
            document.getElementById('pane-details').innerHTML = upcoming.map(e => {
                const d = new Date(e.date + "T00:00:00");
                return `<div id="up-${e.id}" class="group cursor-pointer bg-slate-800/40 hover:bg-slate-800 p-4 rounded-lg border border-slate-700/50 mb-2 transition"><div class="flex items-center justify-between mb-1"><p class="text-[10px] font-bold text-slate-500 uppercase">${months[d.getMonth()]} ${d.getDate()}</p><span class="w-2 h-2 rounded-full dot-${e.cat}"></span></div><p class="font-bold text-white group-hover:text-blue-400 transition text-sm">${e.name}</p></div>`;
            }).join('');
            upcoming.forEach(e => {
                const el = document.getElementById(`up-${e.id}`);
                if(el) el.onclick = () => showEvent(e);
            });
        }

        function renderUnscheduled() {
            document.getElementById('idea-count').innerText = unscheduled.length;
            document.getElementById('unscheduled-ideas').innerHTML = unscheduled.map(i => `<div class="text-[11px] p-3 bg-slate-800/30 rounded border-l-2 border-slate-700 mb-2 flex items-center gap-3"><span class="w-2 h-2 shrink-0 rounded-full dot-${i.cat}"></span><div class="flex flex-col"><span class="font-bold text-slate-300 leading-tight">${i.name}</span>${i.details ? `<span class="text-slate-500 italic text-[9px] mt-1">${i.details}</span>` : ''}</div></div>`).join('');
        }

        function parseCSVRow(t) { const re = /(?!\s*$)\s*(?:'([^']*)'|"([^"]*)"|([^,]*))\s*(?:,|$)/g; const res = []; t.replace(re, (m, p1, p2, p3) => { res.push(p1 || p2 || p3 || ""); return ""; }); return res; }
        function parseCSVDate(s) { if (!s || !s.trim()) return null; const p = s.split('/'); if (p.length !== 3) return null; return `20${p[2].padStart(2,'0')}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`; }
        function sanitizeId(t) { return t.replace(/[^a-z0-9]/gi, '_').replace(/_+/g, '_').toLowerCase(); }

        // --- CUSTOM MODAL & SYNC LOGIC ---
        const modal = document.getElementById('customModal');
        const modalYes = document.getElementById('modalYes');
        const modalNo = document.getElementById('modalNo');
        const modalCancel = document.getElementById('modalCancel');
        const fileInput = document.getElementById('csvFileInput');

        let currentFile = null;

        const performSync = async (shouldWipe) => {
            if (shouldWipe) {
                const s = await getDocs(collection(db, `${ORGANIZATION_NAME}_events`));
                const d = [];
                s.forEach(x => d.push(deleteDoc(doc(db, `${ORGANIZATION_NAME}_events`, x.id))));
                await Promise.all(d);
            }
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const rows = ev.target.result.split(/\r?\n/).slice(1);
                let count = 0;
                for (const row of rows) {
                    if (!row.trim()) continue;
                    try {
                        const cols = parseCSVRow(row);
                        const dD = parseCSVDate(cols[0]);
                        const id = (dD ? dD + '_' : 'idea_') + sanitizeId(cols[1]);
                        await setDoc(doc(db, `${ORGANIZATION_NAME}_events`, id), {
                            date: dD || '', name: cols[1], cat: (cols[2] || 'social').toLowerCase(), details: cols[3] || '', type: dD ? 'scheduled' : 'unscheduled'
                        });
                        count++;
                    } catch (err) { console.error(err); }
                }
                alert(`Sync Complete: ${count} items.`);
                location.reload();
            };
            reader.readAsText(currentFile);
        };

        fileInput.addEventListener('change', (e) => {
            currentFile = e.target.files[0];
            if (currentFile) modal.classList.remove('hidden');
        });

        modalYes.onclick = () => { modal.classList.add('hidden'); performSync(true); };
        modalNo.onclick = () => { modal.classList.add('hidden'); performSync(false); };
        modalCancel.onclick = () => { modal.classList.add('hidden'); fileInput.value = ''; };

        // ADMIN BUTTONS
        document.getElementById('unlockBtn').onclick = () => {
            const p = prompt("Password:");
            if (p && btoa(p.toLowerCase().trim()) === MASKED_PASS) {
                document.getElementById('import-gate').classList.add('hidden');
                document.getElementById('import-controls').classList.remove('hidden');
            }
        };
        document.getElementById('lockBtn').onclick = () => {
            document.getElementById('import-gate').classList.remove('hidden');
            document.getElementById('import-controls').classList.add('hidden');
        };
        document.getElementById('wipeBtn').onclick = async () => {
            if (confirm(`Clear all ${ORGANIZATION_NAME} events?`)) {
                const s = await getDocs(collection(db, `${ORGANIZATION_NAME}_events`));
                const d = [];
                s.forEach(x => d.push(deleteDoc(doc(db, `${ORGANIZATION_NAME}_events`, x.id))));
                await Promise.all(d);
                location.reload();
            }
        };

        initApp();
    </script>
</body>
</html>
