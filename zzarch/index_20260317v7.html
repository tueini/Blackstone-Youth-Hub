<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Youth Activities</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; }
        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .month-card { background: #1e293b; border-radius: 12px; padding: 1.25rem; border: 1px solid #334155; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; font-size: 0.75rem; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 6px; background: #0f172a; transition: all 0.2s; cursor: default; position: relative; }
        .day.has-event { cursor: pointer; font-weight: 800; border: 1px solid rgba(255,255,255,0.05); }
        .day.has-event:hover { transform: scale(1.1); z-index: 10; filter: brightness(1.25); border-color: white; }
        .day.today { border: 2px solid #fbbf24; box-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
        .dot-social, .event-social { background-color: #ec4899; }
        .dot-physical, .event-physical { background-color: #10b981; }
        .dot-spiritual, .event-spiritual { background-color: #8b5cf6; }
        .dot-intellectual, .event-intellectual { background-color: #f59e0b; }
        .dot-combined, .event-combined { background-color: #3b82f6; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .custom-file-upload { border: 1px solid #3b82f6; display: inline-block; padding: 12px; cursor: pointer; background: #1e293b; color: #60a5fa; border-radius: 8px; width: 100%; text-align: center; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.2s; }
        .custom-file-upload:hover { background: #1d4ed8; color: white; }
    </style>
</head>
<body class="flex flex-col lg:flex-row min-h-screen">

    <main class="flex-1 p-6 lg:p-10 lg:h-screen lg:overflow-y-auto">
        <header class="mb-10 text-center lg:text-left">
            <a href="/" class="text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-2 block hover:underline">← Ward Hub</a>
            <h1 id="org-title" class="text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 text-white">2026 Activities</h1>
            <p class="text-slate-400 font-medium mb-4">Blackstone Ward</p>
            <div class="flex flex-wrap gap-3 text-[9px] font-bold uppercase tracking-widest justify-center lg:justify-start">
                <span class="flex items-center"><span class="w-2 h-2 bg-pink-500 rounded-full mr-1"></span> Social</span>
                <span class="flex items-center"><span class="w-2 h-2 bg-emerald-500 rounded-full mr-1"></span> Physical</span>
                <span class="flex items-center"><span class="w-2 h-2 bg-violet-500 rounded-full mr-1"></span> Spiritual</span>
                <span class="flex items-center"><span class="w-2 h-2 bg-amber-500 rounded-full mr-1"></span> Intellectual</span>
                <span class="flex items-center"><span class="w-2 h-2 bg-blue-500 rounded-full mr-1"></span> Combined</span>
            </div>
        </header>

        <details id="past-months-toggle" class="mb-12 group">
            <summary class="inline-flex items-center bg-slate-800 hover:bg-slate-700 px-6 py-3 rounded-full transition border border-slate-700 cursor-pointer list-none">
                <span id="toggle-text" class="text-slate-400 font-bold text-sm">See Previous Months</span>
            </summary>
            <div id="past-months" class="calendar-grid mt-8 opacity-60"></div>
        </details>
        <div id="active-months" class="calendar-grid mb-12"></div>
    </main>

    <aside id="info-pane" class="w-full lg:w-96 bg-slate-900 border-t lg:border-t-0 lg:border-l border-slate-800 p-8 flex flex-col lg:h-screen lg:sticky lg:top-0">
        <div class="flex-1 overflow-y-auto pr-2">
            <h2 id="pane-title" class="text-2xl font-black mb-2 text-white">Upcoming Events</h2>
            <p id="pane-date" class="text-blue-400 font-bold mb-6 uppercase tracking-wider text-sm">Next 3 Activities</p>
            <div id="pane-details" class="space-y-4"></div>
            <hr class="my-8 border-slate-800">
            <h3 class="text-sm font-black text-slate-500 uppercase tracking-widest mb-4">Unscheduled Events</h3>
            <div id="unscheduled-ideas" class="space-y-2"></div>
        </div>
        
        <div class="mt-6 pt-6 border-t border-slate-800 space-y-3">
            <div id="import-gate">
                <button id="unlockBtn" class="w-full bg-slate-800 hover:bg-blue-600 text-white text-xs font-bold py-3 px-4 rounded-lg transition-all uppercase tracking-widest">
                    Manage Data
                </button>
            </div>
            <div id="import-controls" class="hidden space-y-3">
                <label for="csvFileInput" class="custom-file-upload">Select CSV File</label>
                <input type="file" id="csvFileInput" accept=".csv" style="display:none;">
                <button id="wipeBtn" class="w-full bg-red-900/20 hover:bg-red-600 text-red-500 hover:text-white text-[10px] font-black py-2 rounded-lg transition-all uppercase tracking-widest border border-red-900/50">
                    Clear All Events
                </button>
            </div>
            <p class="text-[9px] text-slate-600 mt-2 text-center">v3.6 Data Management Build</p>
        </div>
    </aside>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, setDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CHANGE THIS NAME FOR EACH FOLDER
        const ORGANIZATION_NAME = "Priests"; 
        document.getElementById('org-title').innerText = `2026 ${ORGANIZATION_NAME} Activities`;

        const firebaseConfig = {
            apiKey: "AIzaSyDrWB07WNqObtjiZb_NntJQZ0dhHyLRBas",
            authDomain: "blackstoneward-b861c.firebaseapp.com",
            projectId: "blackstoneward-b861c",
            storageBucket: "blackstoneward-b861c.firebasestorage.app",
            messagingSenderId: "609425206588",
            appId: "1:609425206588:web:99ae3cb602c82e212dc239",
            measurementId: "G-0T68YN4Y2P"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const MASKED_PASS = "Y2FwdGFpbm1vcm9uaQ==";

        let events = [];
        let unscheduled = [];
        const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
        const today = new Date();

        async function initApp() {
            try {
                const querySnapshot = await getDocs(collection(db, `${ORGANIZATION_NAME}_events`));
                const allData = [];
                querySnapshot.forEach((doc) => allData.push({...doc.data(), id: doc.id}));
                events = allData.filter(d => d.type === 'scheduled');
                unscheduled = allData.filter(d => d.type === 'unscheduled');
                refreshUI();
            } catch (e) { console.error(e); }
        }

        function refreshUI() { renderCalendar(); renderDefaultPane(); renderUnscheduled(); }

        // --- CALENDAR LOGIC (Standard v3.5) ---
        function renderCalendar() {
            const activeContainer = document.getElementById('active-months');
            const pastContainer = document.getElementById('past-months');
            activeContainer.innerHTML = ''; pastContainer.innerHTML = '';
            for (let m = 0; m < 12; m++) {
                const monthCard = document.createElement('div');
                const isCurrent = m === today.getMonth();
                monthCard.className = `month-card ${isCurrent ? 'border-blue-500/50 ring-1 ring-blue-500/20' : ''}`;
                monthCard.innerHTML = `<h3 class="font-bold text-slate-300 mb-3">${months[m]} 2026</h3>`;
                const daysGrid = document.createElement('div');
                daysGrid.className = 'days-grid';
                ['S','M','T','W','T','F','S'].forEach(d => { daysGrid.innerHTML += `<div class="opacity-30 font-bold">${d}</div>`; });
                const firstDay = new Date(2026, m, 1).getDay();
                const daysInMonth = new Date(2026, m + 1, 0).getDate();
                for (let i = 0; i < firstDay; i++) daysGrid.innerHTML += `<div></div>`;
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `2026-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const event = events.find(e => e.date === dateStr);
                    const dayEl = document.createElement('div');
                    dayEl.className = `day ${event ? 'has-event event-'+event.cat : ''} ${today.getDate() === d && today.getMonth() === m ? 'today' : ''}`;
                    dayEl.innerHTML = `<span>${d}</span>`;
                    if (event) { dayEl.onclick = () => showEvent(event); }
                    daysGrid.appendChild(dayEl);
                }
                monthCard.appendChild(daysGrid);
                (m < today.getMonth()) ? pastContainer.appendChild(monthCard) : activeContainer.appendChild(monthCard);
            }
        }

        function showEvent(event) {
            document.getElementById('pane-title').innerText = event.name;
            const dateObj = new Date(event.date + "T00:00:00");
            const dayName = dateObj.toLocaleDateString('en-US', { weekday: 'short' });
            document.getElementById('pane-date').innerText = `${months[dateObj.getMonth()]} ${dateObj.getDate()} • ${dayName}`;
            document.getElementById('pane-details').innerHTML = `<div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl"><div class="flex items-center gap-2 mb-4"><span class="w-3 h-3 rounded-full dot-${event.cat}"></span><span class="text-[10px] font-black uppercase tracking-widest text-slate-400">${event.cat}</span></div><p class="text-slate-300 leading-relaxed">${event.details || 'No additional details.'}</p><button id="backBtn" class="mt-8 text-xs text-blue-400 font-bold hover:underline">← Back to Upcoming</button></div>`;
            document.getElementById('backBtn').onclick = renderDefaultPane;
        }

        function renderDefaultPane() {
            const upcoming = events.filter(e => new Date(e.date + "T23:59:59") >= today).sort((a, b) => new Date(a.date) - new Date(b.date)).slice(0, 3);
            document.getElementById('pane-title').innerText = "Upcoming Events";
            document.getElementById('pane-date').innerText = "Next 3 Activities";
            document.getElementById('pane-details').innerHTML = upcoming.map(e => {
                const d = new Date(e.date + "T00:00:00");
                const dayName = d.toLocaleDateString('en-US', { weekday: 'short' });
                return `<div onclick='window.dispatchEvent(new CustomEvent("showEv", {detail: ${JSON.stringify(e)}}))' class="group cursor-pointer bg-slate-800/40 hover:bg-slate-800 p-4 rounded-lg border border-slate-700/50 transition"><div class="flex items-center justify-between mb-1"><p class="text-[10px] font-bold text-slate-500 uppercase">${months[d.getMonth()]} ${d.getDate()} • ${dayName}</p><span class="w-2 h-2 rounded-full dot-${e.cat}"></span></div><p class="font-bold text-white group-hover:text-blue-400 transition">${e.name}</p></div>`;
            }).join('');
        }
        window.addEventListener('showEv', (e) => showEvent(e.detail));

        function renderUnscheduled() {
            const container = document.getElementById('unscheduled-ideas');
            container.innerHTML = unscheduled.map(item => `<div class="text-[11px] p-3 bg-slate-800/30 rounded border-l-2 border-slate-700 flex items-center gap-3"><span class="w-2 h-2 shrink-0 rounded-full dot-${item.cat}"></span><div class="flex flex-col"><span class="font-bold text-slate-300">${item.name}</span>${item.details ? `<span class="text-slate-500 italic text-[9px]">${item.details}</span>` : ''}</div></div>`).join('');
        }

        function parseCSVDate(dateStr) {
            if (!dateStr || dateStr.trim() === "") return null;
            const parts = dateStr.split('/');
            if (parts.length !== 3) return null;
            const m = parts[0].padStart(2, '0');
            const d = parts[1].padStart(2, '0');
            const y = "20" + parts[2].padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // --- DATA MANAGEMENT ---
        const unlockBtn = document.getElementById('unlockBtn');
        const wipeBtn = document.getElementById('wipeBtn');
        const importControls = document.getElementById('import-controls');
        const fileInput = document.getElementById('csvFileInput');

        unlockBtn.addEventListener('click', () => {
            const pw = prompt("Enter leadership password:");
            if (pw && btoa(pw.toLowerCase().trim()) === MASKED_PASS) {
                document.getElementById('import-gate').classList.add('hidden');
                importControls.classList.remove('hidden');
            }
        });

        wipeBtn.addEventListener('click', async () => {
            if (confirm(`WARNING: This will permanently delete ALL ${ORGANIZATION_NAME} activities from the cloud. Proceed?`)) {
                const querySnapshot = await getDocs(collection(db, `${ORGANIZATION_NAME}_events`));
                const deletePromises = [];
                querySnapshot.forEach((docSnap) => {
                    deletePromises.push(deleteDoc(doc(db, `${ORGANIZATION_NAME}_events`, docSnap.id)));
                });
                await Promise.all(deletePromises);
                alert("Calendar wiped clean.");
                location.reload();
            }
        });

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (event) => {
                const rows = event.target.result.split('\n').slice(1);
                for (const r of rows) {
                    if (!r.trim()) continue;
                    const cols = r.split(',').map(i => i.trim());
                    const dbDate = parseCSVDate(cols[0]);
                    const id = dbDate ? `${dbDate}_${cols[1].replace(/\s+/g, '_')}` : `idea_${cols[1].replace(/\s+/g, '_')}`;
                    await setDoc(doc(db, `${ORGANIZATION_NAME}_events`, id), { 
                        date: dbDate || '', name: cols[1], cat: (cols[2] || 'social').toLowerCase(), details: cols[3] || '', type: dbDate ? 'scheduled' : 'unscheduled' 
                    });
                }
                alert("Import successful.");
                location.reload();
            };
            reader.readAsText(file);
        });

        document.getElementById('past-months-toggle').addEventListener('toggle', (e) => {
            document.getElementById('toggle-text').innerText = e.target.open ? "Hide Previous Months" : "See Previous Months";
        });

        initApp();
    </script>
</body>
</html>
