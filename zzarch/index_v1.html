<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Youth Activities - Blackstone Ward</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }
        .month-card { background: #1e293b; border-radius: 12px; padding: 1.5rem; border: 1px solid #334155; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; font-size: 0.8rem; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 6px; position: relative; cursor: default; }
        
        /* Dynamic Category Colors */
        .event-social { background-color: #ec4899 !important; color: white; }
        .event-physical { background-color: #10b981 !important; color: white; }
        .event-spiritual { background-color: #8b5cf6 !important; color: white; }
        .event-intellectual { background-color: #f59e0b !important; color: white; }

        .day.has-event { font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        .day.has-event:hover { transform: scale(1.2); z-index: 10; filter: brightness(1.2); }
        .day.today { border: 2px solid #3b82f6; box-shadow: 0 0 10px #3b82f6; }
        
        .tooltip { visibility: hidden; position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%); color: #fff; padding: 8px; border-radius: 6px; width: 160px; font-size: 0.75rem; z-index: 20; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); text-align: center; }
        .day:hover .tooltip { visibility: visible; }

        details summary { cursor: pointer; outline: none; list-style: none; }
        details summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="max-w-7xl mx-auto mb-12 text-center">
        <h1 class="text-6xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">
            2026 Youth Activities
        </h1>
        <p class="text-slate-400 text-2xl font-medium tracking-wide">Blackstone Ward • Priests</p>
        
        <div class="mt-8 flex flex-wrap justify-center gap-6 text-sm font-semibold uppercase tracking-wider">
            <span class="flex items-center"><span class="w-3 h-3 bg-pink-500 rounded-full mr-2"></span> Social</span>
            <span class="flex items-center"><span class="w-3 h-3 bg-emerald-500 rounded-full mr-2"></span> Physical</span>
            <span class="flex items-center"><span class="w-3 h-3 bg-violet-500 rounded-full mr-2"></span> Spiritual</span>
            <span class="flex items-center"><span class="w-3 h-3 bg-amber-500 rounded-full mr-2"></span> Intellectual</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <details class="mb-12 group">
            <summary class="inline-flex items-center bg-slate-800 hover:bg-slate-700 px-6 py-3 rounded-full transition border border-slate-700">
                <span class="text-blue-400 font-bold">See Previous Months</span>
                <svg class="w-5 h-5 ml-2 transition-transform group-open:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </summary>
            <div id="past-months" class="calendar-grid mt-8 opacity-60"></div>
        </details>

        <div id="active-months" class="calendar-grid"></div>
        
        <section class="mt-16 bg-slate-800/50 p-8 rounded-2xl border border-slate-700/50 shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-emerald-400">Upcoming / Unscheduled</h2>
            <div id="unscheduled-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </section>
    </main>

    <script>
        const events = [
            { date: '2026-03-25', name: 'Family History Basics', cat: 'spiritual' },
            { date: '2026-03-28', name: 'King Street Cafe Breakfast', cat: 'social' },
            { date: '2026-04-01', name: 'Digital Retro Games', cat: 'social' },
            { date: '2026-04-08', name: 'Make Pottery', cat: 'intellectual' },
            { date: '2026-04-22', name: 'Gospel Debate Night', cat: 'spiritual' },
            { date: '2026-04-29', name: 'Fishing', cat: 'social' },
            { date: '2026-05-06', name: 'Musical Jam session', cat: 'social' }
        ];

        const unscheduled = [
            { name: 'Priest QM Cook-off + Cultural', cat: 'social' },
            { name: 'Pickleball tournament', cat: 'physical' },
            { name: 'Service: Pearl Street Cafe', cat: 'spiritual' },
            { name: 'Service: Bishop\'s Store House', cat: 'spiritual' },
            { name: 'Rock climbing', cat: 'physical' },
            { name: 'Fire & Picnic at the Beach', cat: 'physical' },
            { name: 'Martial Arts w/ John Cowden', cat: 'physical' },
            { name: 'Learn to bake bread', cat: 'intellectual' },
            { name: 'See movie', cat: 'social' },
            { name: 'Dig hole', cat: 'social' },
            { name: 'Basketball Tournament', cat: 'physical' },
            { name: 'Assemble Ikea furniture', cat: 'intellectual' },
            { name: 'Learn better photography', cat: 'intellectual' },
            { name: 'Car rocket soccer', cat: 'social' },
            { name: 'Learn Budgeting & Financial Mgt', cat: 'intellectual' },
            { name: 'Change Tire / oil', cat: 'intellectual' },
            { name: 'Scripture Story Renactment', cat: 'spiritual' },
            { name: 'Study & share scripture', cat: 'spiritual' },
            { name: 'Teacher Prep w YW', cat: 'spiritual' },
            { name: 'Chemistry experiment', cat: 'intellectual' },
            { name: 'Chess + boxing', cat: 'social' },
            { name: 'Soccer with Chairs', cat: 'physical' },
            { name: 'Scripture mastery with a big prize', cat: 'spiritual' },
            { name: 'Ultimate frisbee', cat: 'physical' }
        ];

        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const today = new Date();
        const currentMonth = today.getMonth();

        function renderCalendar() {
            for (let m = 0; m < 12; m++) {
                const monthCard = document.createElement('div');
                monthCard.className = 'month-card';
                
                const monthTitle = document.createElement('h3');
                monthTitle.className = 'text-xl font-bold mb-4 text-blue-400';
                monthTitle.innerText = months[m];
                monthCard.appendChild(monthTitle);

                const daysGrid = document.createElement('div');
                daysGrid.className = 'days-grid';
                ['S','M','T','W','T','F','S'].forEach(d => {
                    const dDiv = document.createElement('div');
                    dDiv.className = 'text-slate-500 font-bold mb-2';
                    dDiv.innerText = d;
                    daysGrid.appendChild(dDiv);
                });

                const firstDay = new Date(2026, m, 1).getDay();
                const daysInMonth = new Date(2026, m + 1, 0).getDate();

                for (let i = 0; i < firstDay; i++) daysGrid.appendChild(document.createElement('div'));

                for (let d = 1; d <= daysInMonth; d++) {
                    const dayDiv = document.createElement('div');
                    dayDiv.className = 'day';
                    dayDiv.innerText = d;

                    const dateStr = `2026-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const event = events.find(e => e.date === dateStr);
                    
                    if (event) {
                        dayDiv.classList.add('has-event', `event-${event.cat}`);
                        const tooltip = document.createElement('div');
                        tooltip.className = `tooltip event-${event.cat}`;
                        tooltip.innerHTML = `<span class="block font-extrabold uppercase text-[10px] opacity-80">${event.cat}</span><strong>${event.name}</strong>`;
                        dayDiv.appendChild(tooltip);
                    }

                    if (today.getFullYear() === 2026 && today.getMonth() === m && today.getDate() === d) {
                        dayDiv.classList.add('today');
                    }
                    daysGrid.appendChild(dayDiv);
                }
                monthCard.appendChild(daysGrid);
                
                if (m < currentMonth) {
                    document.getElementById('past-months').appendChild(monthCard);
                } else {
                    document.getElementById('active-months').appendChild(monthCard);
                }
            }
        }

        function renderUnscheduled() {
            const list = document.getElementById('unscheduled-list');
            unscheduled.forEach(item => {
                const div = document.createElement('div');
                div.className = `border-l-4 bg-slate-900/50 p-3 rounded-r-lg text-sm border-slate-600 hover:border-blue-400 transition cursor-default shadow-sm`;
                const catColors = { social: '#ec4899', physical: '#10b981', spiritual: '#8b5cf6', intellectual: '#f59e0b' };
                div.style.borderLeftColor = catColors[item.cat];
                div.innerText = item.name;
                list.appendChild(div);
            });
        }

        renderCalendar();
        renderUnscheduled();
    </script>
</body>
</html>
