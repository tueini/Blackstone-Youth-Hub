<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Youth Activities - Blackstone Ward</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }
        .month-card { background: #1e293b; border-radius: 12px; padding: 1.5rem; border: 1px solid #334155; }
        
        #featured-month-container .month-card { border: 2px solid #3b82f6; box-shadow: 0 0 25px rgba(59, 130, 246, 0.2); }
        #featured-month-container .day { min-height: 85px; align-items: flex-start; justify-content: flex-start; padding: 6px; flex-direction: column; }
        .event-text { font-size: 0.65rem; margin-top: 4px; line-height: 1.1; font-weight: 700; text-transform: uppercase; }

        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; font-size: 0.8rem; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 6px; position: relative; background: #0f172a; }
        
        .event-social { background-color: #ec4899 !important; }
        .event-physical { background-color: #10b981 !important; }
        .event-spiritual { background-color: #8b5cf6 !important; }
        .event-intellectual { background-color: #f59e0b !important; }

        .day.has-event { cursor: pointer; transition: transform 0.2s; }
        .day.today { border: 2px solid #3b82f6; }
        
        .tooltip { visibility: hidden; position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%); color: #fff; padding: 8px; border-radius: 6px; width: 160px; font-size: 0.75rem; z-index: 20; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); text-align: center; pointer-events: none; }
        .day:hover .tooltip { visibility: visible; }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="max-w-7xl mx-auto mb-12 text-center">
        <h1 class="text-6xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">2026 Youth Activities</h1>
        <p class="text-slate-400 text-2xl font-medium mb-8">Blackstone Ward • Priests</p>
        
        <div class="bg-slate-800 p-4 rounded-xl inline-flex flex-col items-center border border-slate-700 shadow-lg">
            <p class="text-xs text-slate-400 mb-2 font-bold uppercase">Update Calendar via CSV</p>
            <input type="file" id="csvFileInput" accept=".csv" class="text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer">
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <section id="featured-month-container" class="mb-12"></section>
        <details class="mb-12 group">
            <summary class="inline-flex items-center bg-slate-800 hover:bg-slate-700 px-6 py-3 rounded-full transition border border-slate-700 cursor-pointer">
                <span class="text-slate-400 font-bold">See Previous Months</span>
            </summary>
            <div id="past-months" class="calendar-grid mt-8 opacity-60"></div>
        </details>
        <div id="future-months" class="calendar-grid mb-12"></div>
    </main>

    <script>
        let events = [
            { date: '2026-03-25', name: 'Family History Basics', cat: 'spiritual' },
            { date: '2026-03-28', name: 'King Street Cafe Breakfast', cat: 'social' }
        ];

        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const today = new Date();
        const currentMonth = today.getMonth();

        function renderAll() {
            document.getElementById('featured-month-container').innerHTML = '';
            document.getElementById('past-months').innerHTML = '';
            document.getElementById('future-months').innerHTML = '';
            
            for (let m = 0; m < 12; m++) {
                const isFeatured = (m === currentMonth);
                const monthCard = document.createElement('div');
                monthCard.className = 'month-card';
                monthCard.innerHTML = `<h3 class="${isFeatured ? 'text-3xl font-black mb-6' : 'text-xl font-bold mb-4'} text-blue-400">${months[m]} 2026</h3>`;

                const daysGrid = document.createElement('div');
                daysGrid.className = 'days-grid';
                ['S','M','T','W','T','F','S'].forEach(d => {
                    daysGrid.innerHTML += `<div class="text-slate-500 font-bold mb-2">${d}</div>`;
                });

                const firstDay = new Date(2026, m, 1).getDay();
                const daysInMonth = new Date(2026, m + 1, 0).getDate();

                for (let i = 0; i < firstDay; i++) daysGrid.innerHTML += `<div></div>`;

                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `2026-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const event = events.find(e => e.date === dateStr);
                    let dayHTML = `<div class="day ${event ? 'has-event event-'+event.cat : ''} ${today.getDate() === d && today.getMonth() === m ? 'today' : ''}"><span>${d}</span>`;
                    
                    if (event) {
                        if (isFeatured) {
                            dayHTML += `<span class="event-text">${event.name}</span>`;
                        } else {
                            dayHTML += `<div class="tooltip event-${event.cat}"><strong>${event.name}</strong></div>`;
                        }
                    }
                    dayHTML += `</div>`;
                    daysGrid.innerHTML += dayHTML;
                }
                monthCard.appendChild(daysGrid);
                
                if (isFeatured) document.getElementById('featured-month-container').appendChild(monthCard);
                else if (m < currentMonth) document.getElementById('past-months').appendChild(monthCard);
                else document.getElementById('future-months').appendChild(monthCard);
            }
        }

        document.getElementById('csvFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const text = event.target.result;
                const rows = text.split('\n').slice(1); // Skip header
                events = rows.filter(row => row.trim() !== '').map(row => {
                    const [date, name, cat] = row.split(',').map(item => item.trim());
                    return { date, name, cat: cat.toLowerCase() };
                });
                renderAll();
            };
            reader.readAsText(file);
        });

        renderAll();
    </script>
</body>
</html>
